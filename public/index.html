<!DOCTYPE html>
<html>

<head>

<title>
Course Registration System
</title>

<style>

body{
    font-family:Arial;
    margin:40px;
}

input{
    padding:10px;
    margin:5px;
}

button{
    padding:10px;
    cursor:pointer;
}

table{
    width:100%;
    border-collapse:collapse;
    margin-top:20px;
}

table,th,td{
    border:1px solid black;
    padding:10px;
}

</style>

</head>

<body>

<h1>Course Registration System</h1>

<input
type="text"
id="student"
placeholder="Student Name">

<input
type="text"
id="course"
placeholder="Course Name">

<input
type="text"
id="semester"
placeholder="Semester">

<button onclick="registerCourse()">

Register

</button>

<hr>

<h2>Registered Courses</h2>

<table>

<thead>

<tr>

<th>ID</th>
<th>Student</th>
<th>Course</th>
<th>Semester</th>
<th>Action</th>

</tr>

</thead>

<tbody id="tableBody">

</tbody>

</table>

<script>

loadCourses();

function registerCourse(){

    fetch("/register",{

        method:"POST",

        headers:{
            "Content-Type":"application/json"
        },

        body:JSON.stringify({

            student_name:
            document.getElementById("student").value,

            course_name:
            document.getElementById("course").value,

            semester:
            document.getElementById("semester").value

        })

    })

    .then(res=>res.json())

    .then(data=>{

        alert(data.message);

        loadCourses();

    });

}



function loadCourses(){

    fetch("/courses")

    .then(res=>res.json())

    .then(data=>{

        let table="";

        data.forEach(course=>{

            table += `

            <tr>

            <td>${course.id}</td>

            <td>${course.student_name}</td>

            <td>${course.course_name}</td>

            <td>${course.semester}</td>

            <td>

            <button
            onclick="deleteCourse(${course.id})">

            Delete

            </button>

            </td>

            </tr>

            `;

        });

        document.getElementById(
            "tableBody"
        ).innerHTML = table;

    });

}



function deleteCourse(id){

    fetch(`/delete/${id}`,{

        method:"DELETE"

    })

    .then(res=>res.json())

    .then(data=>{

        alert(data.message);

        loadCourses();

    });

}

</script>

</body>

</html>
